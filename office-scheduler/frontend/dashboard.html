<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch làm việc — Volterra Office</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div id="toast-container"></div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="modal-overlay" id="detail-modal">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h3 id="modal-title">Chi tiết ca</h3>
        <p style="font-size:12px;margin-top:2px;color:var(--text-muted)" id="modal-date"></p>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-shift-badge" id="modal-shift-badge"></div>
    <div class="attendee-list" id="modal-attendees"></div>
    <div class="modal-action" id="modal-action"></div>
  </div>
</div>

<div class="modal-overlay" id="pw-modal">
  <div class="modal" style="max-width:380px">
    <div class="modal-header">
      <h3>Đổi mật khẩu</h3>
      <button class="modal-close" onclick="closePwModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Mật khẩu hiện tại</label>
      <input class="form-input" type="password" id="pw-old" placeholder="Nhập mật khẩu hiện tại">
    </div>
    <div class="form-group">
      <label class="form-label">Mật khẩu mới</label>
      <input class="form-input" type="password" id="pw-new" placeholder="Tối thiểu 6 ký tự">
    </div>
    <div class="form-group">
      <label class="form-label">Xác nhận mật khẩu mới</label>
      <input class="form-input" type="password" id="pw-confirm" placeholder="Nhập lại mật khẩu mới">
    </div>
    <div class="modal-action">
      <button class="btn btn-outline" onclick="closePwModal()">Hủy</button>
      <button class="btn btn-primary" onclick="doChangePassword()">Đổi mật khẩu</button>
    </div>
  </div>
</div>

<div class="app-layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="/static/volterra-logo.png" alt="Volterra">
      <div>
        <div class="brand-name">Volterra Office</div>
        <div class="brand-sub">AI Driven for EV Charging</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="/dashboard" class="nav-item active"><span class="icon">🗓️</span>Lịch làm việc</a>
      <a href="/admin" class="nav-item" id="admin-link" style="display:none"><span class="icon">👥</span>Quản lý nhân sự</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar" id="sb-avatar">?</div>
        <div style="overflow:hidden">
          <div class="user-card-name" id="sb-name">...</div>
          <div class="user-card-role" id="sb-role"></div>
        </div>
      </div>
      <button class="sidebar-action-btn" onclick="openPwModal()"><span>🔑</span>Đổi mật khẩu</button>
      <button class="logout-btn" onclick="logout()"><span>🚪</span>Đăng xuất</button>
    </div>
  </aside>

  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="openSidebar()">☰</button>
        <div>
          <div class="topbar-title">Lịch làm việc</div>
          <div class="topbar-sub" id="topbar-sub">Đăng ký ca lên văn phòng</div>
          <div class="topbar-viewing" id="topbar-viewing" style="display:none"></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <select id="user-filter" class="user-filter-select" onchange="onUserFilterChange()">
          <option value="">📋 Lịch của tôi</option>
        </select>
        <div class="view-tabs">
          <div class="view-tab active" id="tab-week" onclick="setView('week')">Tuần</div>
          <div class="view-tab" id="tab-month" onclick="setView('month')">Tháng</div>
        </div>
      </div>
    </div>

    <div class="content-area">
      <div class="stats-bar">
        <div class="stat-card"><div class="stat-label">Ca tôi đã đăng ký</div><div class="stat-value" id="stat-mine">—</div></div>
        <div class="stat-card"><div class="stat-label">Tổng lượt tuần này</div><div class="stat-value" id="stat-week">—</div></div>
        <div class="stat-card"><div class="stat-label">Tổng lượt tháng</div><div class="stat-value" id="stat-month">—</div></div>
      </div>

      <div class="week-nav">
        <button class="btn btn-outline btn-sm" onclick="navPrev()">‹</button>
        <button class="btn btn-ghost btn-sm" onclick="navToday()">Hôm nay</button>
        <button class="btn btn-outline btn-sm" onclick="navNext()">›</button>
        <span class="week-range" id="nav-label">...</span>
        <span style="flex:1"></span>
        <div class="dept-legend">
          <div class="dept-legend-item"><div class="dept-legend-dot" style="background:#3b82f6"></div>Business</div>
          <div class="dept-legend-item"><div class="dept-legend-dot" style="background:#f97316"></div>Hardware</div>
          <div class="dept-legend-item"><div class="dept-legend-dot" style="background:#ec4899"></div>Software</div>
        </div>
      </div>

      <div class="cal-wrapper" id="cal-wrapper">
        <div class="loading-overlay"><div class="loader"></div></div>
      </div>
    </div>
  </div>
</div>

<script src="/static/js/api.js"></script>
<script>
// ── State ──────────────────────────────────────────────────────────────────
const user = requireAuth();
let view = window.innerWidth < 640 ? "month" : "week";
let anchor = new Date();
let calData = {};
let dragging = false;
let dragSlots = [];
let users = [];
let viewedUserId = null;

// ── Boot ───────────────────────────────────────────────────────────────────
if (user) {
  const deptColor = user.department ? DEPT_COLORS[user.department] : null;
  const avatarEl = document.getElementById("sb-avatar");
  avatarEl.textContent = getInitial(user.full_name);
  if (deptColor) avatarEl.style.background = deptColor;

  document.getElementById("sb-name").textContent = user.full_name;

  let roleText = user.role === "admin" ? "Quản trị viên" : "Nhân sự";
  if (user.department) roleText += ` · ${DEPT_LABELS[user.department]}`;
  document.getElementById("sb-role").textContent = roleText;

  if (user.role === "admin") {
    document.getElementById("admin-link").style.display = "flex";
  }
  if (window.innerWidth < 640) {
    view = "month";
    document.getElementById("tab-week").classList.remove("active");
    document.getElementById("tab-month").classList.add("active");
  }

  // Load user list for filter dropdown
  fetchUsers().then(allUsers => {
    users = allUsers.filter(u => u.id !== user.id);
    const sel = document.getElementById("user-filter");
    users.forEach(u => {
      const opt = document.createElement("option");
      opt.value = u.id;
      opt.textContent = `${u.full_name} (${u.employee_code || u.username})`;
      sel.appendChild(opt);
    });
  });

  loadAndRender();
}

function isViewingOther() {
  const val = document.getElementById("user-filter")?.value;
  return val && val !== "";
}

function onUserFilterChange() {
  const val = document.getElementById("user-filter").value;
  viewedUserId = val ? parseInt(val) : null;
  loadAndRender();
}

window.addEventListener("resize", () => {
  if (window.innerWidth < 640 && view === "week") setView("month");
});

// ── Sidebar ────────────────────────────────────────────────────────────────
function openSidebar()  { document.getElementById("sidebar").classList.add("open"); document.getElementById("sidebar-overlay").classList.add("open"); }
function closeSidebar() { document.getElementById("sidebar").classList.remove("open"); document.getElementById("sidebar-overlay").classList.remove("open"); }

// ── Change Password ────────────────────────────────────────────────────────
function openPwModal() {
  ["pw-old","pw-new","pw-confirm"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("pw-modal").classList.add("open");
}
function closePwModal() { document.getElementById("pw-modal").classList.remove("open"); }
document.getElementById("pw-modal").addEventListener("click", e => { if (e.target === e.currentTarget) closePwModal(); });

async function doChangePassword() {
  const oldPass    = document.getElementById("pw-old").value;
  const newPass    = document.getElementById("pw-new").value;
  const confirmPass= document.getElementById("pw-confirm").value;
  if (!oldPass || !newPass || !confirmPass) { showToast("Điền đầy đủ thông tin", "error"); return; }
  if (newPass.length < 6) { showToast("Mật khẩu mới phải có ít nhất 6 ký tự", "error"); return; }
  if (newPass !== confirmPass) { showToast("Mật khẩu mới và xác nhận không khớp", "error"); return; }
  const res = await changePassword(oldPass, newPass);
  if (res && res.ok) {
    showToast("Đổi mật khẩu thành công!");
    closePwModal();
  } else if (res) {
    const e = await res.json();
    showToast(e.detail || "Lỗi đổi mật khẩu", "error");
  }
}

// ── View toggle ────────────────────────────────────────────────────────────
function setView(v) {
  view = v;
  document.getElementById("tab-week").classList.toggle("active", v === "week");
  document.getElementById("tab-month").classList.toggle("active", v === "month");
  loadAndRender();
}

// ── Navigation ─────────────────────────────────────────────────────────────
function navPrev()  { view === "week" ? (anchor = addDays(anchor,-7)) : shiftMonth(-1); loadAndRender(); }
function navNext()  { view === "week" ? (anchor = addDays(anchor, 7)) : shiftMonth( 1); loadAndRender(); }
function navToday() { anchor = new Date(); loadAndRender(); }
function shiftMonth(d) { anchor = new Date(anchor.getFullYear(), anchor.getMonth() + d, 1); }

// ── Data loading ───────────────────────────────────────────────────────────
async function loadAndRender() {
  document.getElementById("cal-wrapper").innerHTML =
    `<div class="loading-overlay"><div class="loader"></div></div>`;
  const months = getRequiredMonths();
  await Promise.all(months.map(([y,m]) => fetchMonth(y,m)));
  renderCalendar();
  updateStats();
  updateViewingIndicator();
}

function updateViewingIndicator() {
  const el = document.getElementById("topbar-viewing");
  if (isViewingOther()) {
    const sel = document.getElementById("user-filter");
    const name = sel.options[sel.selectedIndex]?.text || "người khác";
    el.textContent = `👁 Đang xem: ${name}`;
    el.style.display = "block";
  } else {
    el.style.display = "none";
  }
}

function getRequiredMonths() {
  if (view === "month") return [[anchor.getFullYear(), anchor.getMonth()+1]];
  const mon = getWeekStart(anchor);
  const sun = addDays(mon, 6);
  const months = [[mon.getFullYear(), mon.getMonth()+1]];
  if (sun.getMonth() !== mon.getMonth()) months.push([sun.getFullYear(), sun.getMonth()+1]);
  return months;
}

async function fetchMonth(y, m) {
  const key = `${y}-${pad(m)}`;
  if (calData[`_loaded_${key}`]) return;
  try {
    let url = `/calendar?year=${y}&month=${m}`;
    if (viewedUserId) url += `&view_user_id=${viewedUserId}`;
    const res = await apiFetch(url);
    const data = await res.json();
    data.days.forEach(d => { calData[d.date] = d; });
    calData[`_loaded_${key}`] = true;
  } catch {}
}

function invalidateMonth(dateStr) {
  const [y, mo] = dateStr.split("-");
  delete calData[`_loaded_${y}-${mo}`];
}

// ── Render ─────────────────────────────────────────────────────────────────
function renderCalendar() {
  if (view === "week") renderWeek();
  else renderMonth();
}

// ── WEEK VIEW ──────────────────────────────────────────────────────────────
function renderWeek() {
  const mon = getWeekStart(anchor);
  document.getElementById("nav-label").textContent = formatWeekRange(mon);
  document.getElementById("topbar-sub").textContent = `Tuần: ${formatWeekRange(mon)}`;

  const days = Array.from({length:7}, (_,i) => addDays(mon,i));
  const today = todayStr();

  let html = `<div class="week-grid" id="week-grid">`;

  // Header row
  html += `<div class="wh-corner"></div>`;
  days.forEach(d => {
    const ds = dateObjToStr(d);
    const dow = d.getDay();
    const isToday = ds === today;
    const isWknd  = dow === 0 || dow === 6;
    const past    = isPast(ds);
    html += `<div class="wh-day${isToday?" today":""}${isWknd?" weekend":""}">
      <div class="wh-day-inner">
        <div class="dow">${DOW_VI[dow]}</div>
        <div class="dom">${d.getDate()}</div>
        ${!past && !isViewingOther() ? `<button class="day-book-btn" onclick="openDayBookModal('${ds}',event)">Cả ngày</button>` : ""}
      </div>
    </div>`;
  });

  // Time rows
  SHIFTS.forEach(shift => {
    html += `<div class="time-label" style="font-size:9px;padding:4px 4px 0 0">${SHIFT_LABELS[shift]}</div>`;
    days.forEach(d => {
      const ds = dateObjToStr(d);
      const past = isPast(ds);
      const dayData = calData[ds];
      const slotData = dayData?.shifts?.[shift] || {count:0, has_registered:false, schedule_id:null, dept_counts:{hardware:0,software:0,business:0}};
      const hasMe = slotData.has_registered;
      const count = slotData.count;
      const deptCounts = slotData.dept_counts || {hardware:0, software:0, business:0};

      const cellClass = ["cal-cell", past?"past":"", hasMe?"registered":""].filter(Boolean).join(" ");

      html += `<div class="${cellClass}"
        data-date="${ds}" data-shift="${encodeURIComponent(shift)}"
        onmousedown="startDrag(event,'${ds}','${encodeURIComponent(shift)}')"
        onmouseenter="continueDrag(event,'${ds}','${encodeURIComponent(shift)}')"
        onmouseup="endDrag(event)"
        onclick="openDetail('${ds}','${encodeURIComponent(shift)}')">`;

      // Dept bar
      if (count > 0) {
        html += renderDeptBar(deptCounts, count);
      }

      if (count > 0 || hasMe) {
        const chipClass = hasMe ? "my-chip" : "others-chip";
        html += `<div class="slot-chip ${chipClass}">
          <span>${hasMe ? "✓ Tôi" : "👥"}</span>
          <span class="chip-count">${count}</span>
        </div>`;
      } else if (!past && !isViewingOther()) {
        html += `<div class="slot-chip empty-chip">+ Đăng ký</div>`;
      }

      html += `</div>`;
    });
  });

  html += `</div>`;
  document.getElementById("cal-wrapper").innerHTML = html;

  document.getElementById("week-grid").addEventListener("mouseleave", () => {
    if (dragging) endDrag({});
  });
}

// ── MONTH VIEW ─────────────────────────────────────────────────────────────
function renderMonth() {
  const y = anchor.getFullYear(), m = anchor.getMonth()+1;
  document.getElementById("nav-label").textContent = `${MONTH_VI[m-1]} ${y}`;
  document.getElementById("topbar-sub").textContent = `${MONTH_VI[m-1]} ${y}`;

  const today = todayStr();
  const firstDow = new Date(y,m-1,1).getDay();
  const daysInMonth = getDaysInMonth(y,m);

  let html = `<div class="month-grid">`;
  DOW_VI.forEach((d,i) => {
    html += `<div class="month-daylabel${i===0||i===6?" weekend":""}">${d}</div>`;
  });
  for(let i=0;i<firstDow;i++) html += `<div class="month-cell empty"></div>`;

  for(let day=1;day<=daysInMonth;day++) {
    const ds = toDateStr(y,m,day);
    const past = isPast(ds);
    const isToday = ds === today;
    const dow = new Date(y,m-1,day).getDay();
    const isWknd = dow===0||dow===6;
    const dayData = calData[ds];

    let myCount=0, totalCount=0;
    if (dayData?.shifts) {
      SHIFTS.forEach(s => {
        const sd = dayData.shifts[s];
        if (sd) { totalCount += sd.count; if (sd.has_registered) myCount++; }
      });
    }

    const cellClass = ["month-cell", past?"past":"", isToday?"today":"", isWknd?"weekend":""].filter(Boolean).join(" ");
    html += `<div class="${cellClass}" onclick="openDayDetail('${ds}')">
      <span class="month-day-num">${day}</span>
      <div class="month-pills">`;
    if (myCount > 0) html += `<div class="month-pill has-me">✓ Tôi: ${myCount} ca</div>`;
    if (totalCount > 0) html += `<div class="month-pill">👥 ${totalCount} lượt</div>`;
    html += `</div></div>`;
  }

  html += `</div>`;
  document.getElementById("cal-wrapper").innerHTML = html;
}

// ── Drag-to-select ─────────────────────────────────────────────────────────
function startDrag(e, ds, shiftEnc) {
  if (e.button !== 0) return;
  dragging = true;
  dragSlots = [];
  addDragSlot(ds, decodeURIComponent(shiftEnc));
  e.preventDefault();
}
function continueDrag(e, ds, shiftEnc) {
  if (!dragging) return;
  addDragSlot(ds, decodeURIComponent(shiftEnc));
  document.querySelectorAll(".cal-cell.drag-over").forEach(el => el.classList.remove("drag-over"));
  dragSlots.forEach(({date,shift:s}) => {
    const el = document.querySelector(`[data-date="${date}"][data-shift="${encodeURIComponent(s)}"]`);
    if (el) el.classList.add("drag-over");
  });
}
function addDragSlot(ds, shift) {
  if (!dragSlots.find(x => x.date===ds && x.shift===shift)) dragSlots.push({date:ds, shift});
}
function endDrag(e) {
  if (!dragging) return;
  dragging = false;
  document.querySelectorAll(".cal-cell.drag-over").forEach(el => el.classList.remove("drag-over"));
  if (dragSlots.length > 1) confirmBulkBooking(dragSlots);
}

// ── Bulk booking (drag) ────────────────────────────────────────────────────
async function confirmBulkBooking(slots) {
  if (isViewingOther()) { showToast("Không thể đăng ký khi đang xem lịch người khác", "error"); return; }
  const future = slots.filter(({date}) => !isPast(date));
  if (future.length === 0) { showToast("Không có ca tương lai nào được chọn","error"); return; }

  const toBook   = future.filter(({date,shift}) => !calData[date]?.shifts?.[shift]?.has_registered);
  const toCancel = future.filter(({date,shift}) =>  calData[date]?.shifts?.[shift]?.has_registered);

  let msg = `Bạn đã chọn ${future.length} ô:\n`;
  if (toBook.length)   msg += `• Đăng ký ${toBook.length} ca mới\n`;
  if (toCancel.length) msg += `• Hủy ${toCancel.length} ca đã đăng ký\n`;
  if (!confirm(msg + "\nXác nhận?")) return;

  let ok=0, fail=0;
  for (const {date, shift} of toBook) {
    const res = await apiFetch("/schedules", { method:"POST", body:JSON.stringify({date, shift}) });
    if (res && (res.ok || res.status===409)) ok++; else fail++;
  }
  for (const {date, shift} of toCancel) {
    const sid = calData[date]?.shifts?.[shift]?.schedule_id;
    if (!sid) continue;
    const success = await cancelScheduleWithLock(sid, date);
    if (success) ok++; else fail++;
  }

  calData = {};
  loadAndRender();
}

// ── "Cả ngày" modal ────────────────────────────────────────────────────────
function openDayBookModal(ds, e) {
  if (isViewingOther()) { showToast("Không thể thao tác khi đang xem lịch người khác", "error"); return; }
  e.stopPropagation();
  const [y,m,d] = ds.split("-");
  const dateLabel = `${d}/${m}/${y} — ${DOW_VI[new Date(ds).getDay()]}`;

  document.getElementById("modal-title").textContent = dateLabel;
  document.getElementById("modal-date").textContent = "Đăng ký hoặc hủy tất cả ca trong ngày";
  document.getElementById("modal-shift-badge").textContent = "";

  const dayData = calData[ds];
  const myShifts   = SHIFTS.filter(s => dayData?.shifts?.[s]?.has_registered);
  const otherShifts= SHIFTS.filter(s => !dayData?.shifts?.[s]?.has_registered);
  const allBooked  = myShifts.length === SHIFTS.length;

  const action = document.getElementById("modal-action");
  action.innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Đóng</button>
    ${otherShifts.length ? `<button class="btn btn-primary" onclick="handleDayAction('${ds}','book')">✅ Đăng ký cả ngày</button>` : ""}
    ${myShifts.length    ? `<button class="btn btn-danger"  onclick="handleDayAction('${ds}','cancel')">🗑 Hủy cả ngày</button>` : ""}
  `;

  // Preview các ca
  let html = "";
  SHIFTS.forEach(shift => {
    const sd = dayData?.shifts?.[shift] || {count:0, has_registered:false};
    const hasMe = sd.has_registered;
    html += `<div style="display:flex;align-items:center;justify-content:space-between;
      padding:8px 10px;border-radius:7px;margin-bottom:4px;
      background:${hasMe?"var(--brand-light)":"var(--surface-2)"};
      border:1px solid ${hasMe?"var(--brand)":"var(--border)"}">
      <span style="font-weight:600;font-size:13px">${SHIFT_LABELS[shift]}</span>
      <span style="font-size:11px;color:var(--text-muted)">${sd.count} người
        ${hasMe?"<span style='color:var(--brand);font-weight:600;margin-left:4px'>✓ Đã đăng ký</span>":""}
      </span>
    </div>`;
  });
  document.getElementById("modal-attendees").innerHTML = html;
  document.getElementById("detail-modal").classList.add("open");
}

async function handleDayAction(ds, action) {
  const label = action === "book" ? "đăng ký" : "hủy";
  if (!confirm(`Xác nhận ${label} tất cả ca ngày này?`)) return;
  closeModal();
  const { ok, fail } = await bookOrCancelDay(ds, calData, action);
  if (fail === 0) showToast(`Đã ${label} ${ok} ca thành công!`);
  else showToast(`${ok} ca thành công, ${fail} ca thất bại`, fail > 0 ? "error" : "success");
  invalidateMonth(ds);
  calData = {};
  loadAndRender();
}

// ── Single cell open ────────────────────────────────────────────────────────
function openDetail(ds, shiftEnc) {
  if (dragging || dragSlots.length > 1) return;
  showDetailModal(ds, decodeURIComponent(shiftEnc));
}

function openDayDetail(ds) {
  const dayData = calData[ds];
  const [y,m,d] = ds.split("-");
  const dateLabel = `${d}/${m}/${y} — ${DOW_VI[new Date(ds).getDay()]}`;
  const past = isPast(ds);

  document.getElementById("modal-title").textContent = dateLabel;
  document.getElementById("modal-date").textContent = "Tất cả khung giờ trong ngày";
  document.getElementById("modal-shift-badge").textContent = "";

  let html = "";
  SHIFTS.forEach(shift => {
    const sd = dayData?.shifts?.[shift] || {count:0, has_registered:false, schedule_id:null};
    const hasMe = sd.has_registered;
    const disabledAttr = past ? "disabled style='opacity:.4;cursor:default'" : "";
    html += `<div style="display:flex;align-items:center;justify-content:space-between;
      padding:8px 10px;border-radius:7px;margin-bottom:4px;
      background:${hasMe?"var(--brand-light)":"var(--surface-2)"};
      border:1px solid ${hasMe?"var(--brand)":"var(--border)"}">
      <div>
        <span style="font-weight:600;font-size:13px">${SHIFT_LABELS[shift]}</span>
        <span style="font-size:11px;color:var(--text-muted);margin-left:8px">${sd.count} người</span>
        ${hasMe ? '<span style="font-size:11px;color:var(--brand);margin-left:6px;font-weight:600">✓ Đã đăng ký</span>' : ""}
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" style="color:var(--brand);font-size:11px"
          onclick="showDetailModal('${ds}','${encodeURIComponent(shift)}')">Xem</button>
        ${!past && !isViewingOther() ? `<button class="btn btn-sm ${hasMe?"btn-danger":"btn-primary"}" ${disabledAttr}
          onclick="toggleBooking('${ds}','${encodeURIComponent(shift)}',${hasMe},${sd.schedule_id||"null"},true)">${hasMe?"Hủy":"Đăng ký"}</button>` : ""}
      </div>
    </div>`;
  });

  document.getElementById("modal-attendees").innerHTML = html;
  document.getElementById("modal-action").innerHTML = !past && !isViewingOther()
    ? `<button class="btn btn-primary" onclick="openDayBookModal('${ds}',event)">📋 Đăng ký / Hủy cả ngày</button>`
    : "";
  document.getElementById("detail-modal").classList.add("open");
}

// ── Detail modal (single shift) ────────────────────────────────────────────
async function showDetailModal(ds, shiftOrEnc) {
  const shift = decodeURIComponent(shiftOrEnc);
  const [y,m,d] = ds.split("-");
  const dayData = calData[ds];
  const sd = dayData?.shifts?.[shift] || {count:0, has_registered:false, schedule_id:null};
  const past = isPast(ds);

  document.getElementById("modal-title").textContent = `${d}/${m}/${y} — ${DOW_VI[new Date(ds).getDay()]}`;
  document.getElementById("modal-date").textContent = `Ca ${SHIFT_LABELS[shift]}`;
  document.getElementById("modal-shift-badge").textContent = `🕐 ${SHIFT_LABELS[shift]}  •  ${sd.count} người`;
  document.getElementById("modal-attendees").innerHTML =
    `<div class="loading-overlay"><div class="loader"></div></div>`;

  const actionDiv = document.getElementById("modal-action");
  if (isViewingOther()) {
    actionDiv.innerHTML = `<span style="font-size:12px;color:var(--text-muted)">👁 Đang xem lịch của người khác</span>`;
  } else if (!past) {
    const hasMe = sd.has_registered;
    actionDiv.innerHTML = `<button class="btn ${hasMe?"btn-danger":"btn-primary"}"
      onclick="toggleBooking('${ds}','${encodeURIComponent(shift)}',${hasMe},${sd.schedule_id||"null"})">
      ${hasMe ? "🗑 Hủy đăng ký" : "✅ Đăng ký ca này"}
    </button>`;
  } else {
    actionDiv.innerHTML = `<span style="font-size:12px;color:var(--text-muted)">Ngày đã qua</span>`;
  }

  document.getElementById("detail-modal").classList.add("open");

  try {
    const res = await apiFetch(`/calendar/detail?date_str=${ds}&shift=${encodeURIComponent(shift)}`);
    const data = await res.json();
    const container = document.getElementById("modal-attendees");
    if (!data.attendees?.length) {
      container.innerHTML = `<p class="empty-state">Chưa có ai đăng ký ca này 🏖️</p>`;
      return;
    }
    // Attendees đã được sort từ server: business → hardware → software → created_at
    container.innerHTML = data.attendees.map(u => {
      const deptColor = u.department ? DEPT_COLORS[u.department] : "var(--brand)";
      return `<div class="attendee-item${u.id===user.id?" is-me":""}">
        <div class="avatar" style="background:${deptColor}">${getInitial(u.full_name)}</div>
        <div style="flex:1">
          <div class="attendee-name">${u.full_name}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
            <span style="font-size:11px;color:var(--text-muted)">${u.username}</span>
            ${u.department ? renderDeptBadge(u.department) : ""}
          </div>
        </div>
        ${u.id===user.id?'<span class="attendee-you">Bạn</span>':""}
      </div>`;
    }).join("");
  } catch {
    document.getElementById("modal-attendees").innerHTML =
      `<p class="empty-state" style="color:var(--danger)">Lỗi tải dữ liệu</p>`;
  }
}

function closeModal() { document.getElementById("detail-modal").classList.remove("open"); }
document.getElementById("detail-modal").addEventListener("click", e => { if (e.target === e.currentTarget) closeModal(); });

// ── Toggle single booking ──────────────────────────────────────────────────
async function toggleBooking(ds, shiftOrEnc, hasRegistered, scheduleId, keepModalOpen=false) {
  const shift = decodeURIComponent(shiftOrEnc);
  try {
    if (hasRegistered && scheduleId) {
      const result = await cancelScheduleWithLock(scheduleId, ds);
      if (!result) return; // lỗi hoặc user bấm cancel
      // Nếu là "ABSENCE_SENT" thì vẫn reload để cập nhật UI
    } else {
      const res = await apiFetch("/schedules", { method:"POST", body:JSON.stringify({date:ds, shift}) });
      if (res && res.ok) {
        showToast(`Đã đăng ký ${SHIFT_LABELS[shift]} ngày ${ds}`, "success");
      } else if (res) {
        const e = await res.json(); showToast(e.detail||"Lỗi đăng ký","error"); return;
      }
    }
  } catch { showToast("Lỗi kết nối","error"); return; }

  invalidateMonth(ds);
  calData = {};
  if (!keepModalOpen) closeModal();
  await loadAndRender();
  if (keepModalOpen) openDayDetail(ds);
}

// ── Stats ──────────────────────────────────────────────────────────────────
async function updateStats() {
  const y = anchor.getFullYear(), m = anchor.getMonth()+1;
  let mine=0, weekTotal=0, monthTotal=0;
  const mon = getWeekStart(anchor);
  const sun = dateObjToStr(addDays(mon,6));
  const monStr = dateObjToStr(mon);

  Object.entries(calData).forEach(([ds, dd]) => {
    if (ds.startsWith("_")) return;
    if (ds.startsWith(`${y}-${pad(m)}`)) {
      SHIFTS.forEach(s => {
        const sd = dd?.shifts?.[s];
        if (!sd) return;
        monthTotal += sd.count;
        if (sd.has_registered) mine++;
        if (ds >= monStr && ds <= sun) weekTotal += sd.count;
      });
    }
  });

  document.getElementById("stat-mine").textContent = mine;
  document.getElementById("stat-week").textContent = weekTotal;
  document.getElementById("stat-month").textContent = monthTotal;
}

document.addEventListener("mouseup", () => { if (dragging) { dragging = false; dragSlots = []; } });
</script>
